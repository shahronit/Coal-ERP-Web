# Render Blueprint — Coal ERP Web (Firestore, matches desktop app)
# https://dashboard.render.com/blueprint/new?repo=https://github.com/shahronit/Coal-ERP-Web

services:
  - type: web
    name: coal-erp-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PROVIDER
        value: firestore
      - key: FIREBASE_PROJECT_ID
        value: coal-trading-app
      - key: FIREBASE_STORAGE_BUCKET
        value: coal-trading-app.firebasestorage.app
      - key: BACKUP_GCS_BUCKET
        value: coal-trading-app-backups
      - key: TRADECRM_STATIC_DIR
        value: /app/frontend/dist
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
