# Render Blueprint — Coal ERP Web
# https://dashboard.render.com/blueprint/new?repo=https://github.com/shahronit/Coal-ERP-Web
#
# NOTE: Render free tier allows one free Postgres per workspace. If you already
# have a free DB, either add a payment method and use basic-256mb below, or
# connect DATABASE_URL manually on the web service (Neon, Supabase, etc.).

databases:
  - name: coal-erp-db
    databaseName: tradecrm
    user: tradecrm
    plan: basic-256mb
    region: singapore

services:
  - type: web
    name: coal-erp-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: coal-erp-db
          property: connectionString
      - key: TRADECRM_STATIC_DIR
        value: /app/frontend/dist
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
